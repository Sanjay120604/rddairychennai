<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Profile — RD Dairy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
<style>
  :root{--amber:#F5A800;--amber-dark:#C47E00;--amber-light:#FFEAA0;--amber-pale:#FFF8DC;--amber-bg:#FFFBF0;--navy:#1B2A5A;--navy-light:#2D3F7A;--ok:#2e7d32;--err:#c0392b}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;color:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(ellipse 70% 60% at 80% 10%,rgba(245,168,0,.22) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 10% 90%,rgba(27,42,90,.10) 0%,transparent 55%),var(--amber-bg)}
  .card{width:100%;max-width:480px;background:#fff;border-radius:24px;box-shadow:0 24px 70px rgba(27,42,90,.16);overflow:hidden;animation:rise .5s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .head{background:linear-gradient(135deg,var(--navy),var(--navy-light));padding:26px 28px;text-align:center;position:relative}
  .head::after{content:'';position:absolute;left:0;right:0;bottom:0;height:4px;background:linear-gradient(90deg,var(--amber),var(--amber-light),var(--amber))}
  .head img{width:54px;height:54px;border-radius:14px;object-fit:cover;border:2px solid rgba(245,168,0,.55);margin-bottom:8px}
  .head h2{font-family:'Playfair Display',serif;color:#fff;font-size:1.4rem}
  .head p{color:var(--amber-light);font-size:.85rem;font-weight:600;margin-top:2px}
  .body{padding:26px 28px 30px}
  .intro{background:var(--amber-pale);border:1px solid var(--amber-light);border-radius:12px;padding:11px 14px;font-size:.84rem;font-weight:600;color:var(--navy);margin-bottom:18px;line-height:1.5}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:.8rem;font-weight:700;margin-bottom:6px}
  .field label .opt{color:var(--amber-dark);font-weight:600;font-size:.74rem}
  .field input,.field textarea{width:100%;padding:12px 14px;font-family:inherit;font-size:.95rem;font-weight:600;border:1.5px solid var(--amber-light);border-radius:11px;background:var(--amber-bg);color:var(--navy);transition:border-color .2s,box-shadow .2s,background .2s;outline:none;resize:vertical}
  .field input:focus,.field textarea:focus{border-color:var(--amber);background:#fff;box-shadow:0 0 0 4px rgba(245,168,0,.15)}
  .field input:disabled{background:#f0ece0;color:var(--navy-light);cursor:not-allowed}
  .field .hint{font-size:.72rem;color:var(--navy-light);margin-top:4px;font-weight:600}
  .btn{width:100%;padding:14px;background:var(--amber);color:var(--navy);border:none;border-radius:12px;font-family:inherit;font-weight:800;font-size:1rem;cursor:pointer;box-shadow:0 8px 22px rgba(245,168,0,.4);transition:transform .15s,background .2s;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:6px}
  .btn:hover{background:#ffc62b;transform:translateY(-2px)}
  .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .spinner{width:18px;height:18px;border:2.5px solid rgba(27,42,90,.3);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn.loading .spinner{display:block}.btn.loading .lbl{display:none}
  .msg{margin-top:14px;padding:11px 14px;border-radius:10px;font-size:.85rem;font-weight:700;display:none;line-height:1.4}
  .msg.show{display:block}
  .msg.ok{background:#e8f5e9;color:var(--ok);border:1px solid #a5d6a7}
  .msg.err{background:#fdecea;color:var(--err);border:1px solid #f5b7b1}
  .links{text-align:center;margin-top:16px;font-size:.85rem;font-weight:700}
  .links a{color:var(--amber-dark);text-decoration:none;margin:0 8px}
  .links a:hover{text-decoration:underline}
  @media(max-width:480px){.head,.body{padding-left:20px;padding-right:20px}}
</style>
</head>

    <div class="body">
      <div class="intro" id="intro">Please complete your profile before you start shopping. Your address will be used automatically when you place orders.</div>

      <div class="field">
        <label>Full Name</label>
        <input id="pName" type="text" placeholder="Your name"/>
      </div>
      <div class="field">
        <label>Mobile Number</label>
        <input id="pMobile" type="tel" disabled/>
        <div class="hint">This is your account ID and can't be changed.</div>
      </div>
      <div class="field">
        <label>Email Address <span class="opt">(optional)</span></label>
        <input id="pEmail" type="email" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Delivery Address</label>
        <textarea id="pAddress" rows="3" placeholder="Flat / house no, street, area, Chennai, pincode"></textarea>
      </div>

      <button class="btn" id="saveBtn" onclick="save()">
        <span class="lbl">Save &amp; Continue</span>
        <span class="spinner"></span>
      </button>
      <div class="msg" id="msg"></div>

      <div class="links">
        <a href="index.html">← Back to store</a>
        <a href="#" onclick="logout();return false;">Log out</a>
      </div>

<script>
/* Same Apps Script Web App URL as the other pages */
var API_URL = "https://script.google.com/macros/s/AKfycbyB-pCn5FPFzHyHQWjziQ_QvsFFSlkpzdaRCeVGGVOWbYAXdMoTADMwAW6humC0-Eok/exec";
var SESSION_KEY = "rd_dairy_user";
function $(id){return document.getElementById(id);}

function getUser(){ try{return JSON.parse(localStorage.getItem(SESSION_KEY));}catch(e){return null;} }
function setUser(u){ localStorage.setItem(SESSION_KEY, JSON.stringify(u)); }
function logout(){ localStorage.removeItem(SESSION_KEY); window.location.href="auth.html"; }

async function api(p){
  if(API_URL.indexOf("PASTE_YOUR")!==-1) throw new Error("Add your Apps Script URL (API_URL) in profile.html.");
  var res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)});
  return res.json();
}

function showMsg(t,type){ var m=$("msg"); m.textContent=t; m.className="msg show "+type; }

async function save(){
  var name=$("pName").value.trim();
  var email=$("pEmail").value.trim();
  var address=$("pAddress").value.trim();
  var u=getUser();
  if(!u){ window.location.href="auth.html"; return; }
  if(!name){ return showMsg("Please enter your name.","err"); }
  if(!address){ return showMsg("Delivery address is required.","err"); }
  if(email && !/^\S+@\S+\.\S+$/.test(email)){ return showMsg("Please enter a valid email or leave it blank.","err"); }

  var btn=$("saveBtn"); btn.classList.add("loading"); btn.disabled=true;
  try{
    var r=await api({action:"saveProfile",mobile:u.mobile,name:name,email:email,address:address});
    if(r.success){
      setUser({name:name,mobile:u.mobile,email:email,address:address,profileComplete:true});
      showMsg("Profile saved! Redirecting to store...","ok");
      setTimeout(function(){ window.location.href="index.html"; },800);
    }else showMsg(r.message||"Could not save.","err");
  }catch(e){ showMsg(e.message,"err"); }
  finally{ btn.classList.remove("loading"); btn.disabled=false; }
}

/* on load: must be logged in; prefill from session, then refresh from server */
(async function(){
  var u=getUser();
  if(!u||!u.mobile){ window.location.href="auth.html"; return; }
  $("pMobile").value=u.mobile;
  $("pName").value=u.name||"";
  $("pEmail").value=u.email||"";
  $("pAddress").value=u.address||"";
  if(u.profileComplete){ $("intro").textContent="Update your profile details below. Your saved address is used automatically at checkout."; }
  try{
    var r=await api({action:"getProfile",mobile:u.mobile});
    if(r.success){
      $("pName").value=r.name||$("pName").value;
      $("pEmail").value=r.email||"";
      $("pAddress").value=r.address||"";
    }
  }catch(e){}
})();
</script>
</body>
