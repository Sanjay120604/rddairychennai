<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Analytics — RD Dairy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{--amber:#F5A800;--amber-dark:#C47E00;--amber-light:#FFEAA0;--amber-pale:#FFF8DC;--amber-bg:#FFFBF0;--navy:#1B2A5A;--navy-light:#2D3F7A;--ok:#2e7d32}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;color:var(--navy);background:var(--amber-bg);min-height:100vh}
  header{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:0 2px 0 var(--amber)}
  header h1{font-family:'Playfair Display',serif;font-size:1.4rem;display:flex;align-items:center;gap:10px}
  header .badge{width:34px;height:34px;border-radius:9px;background:var(--amber);color:var(--navy);display:grid;place-items:center;font-weight:800}
  .top-links a{color:var(--amber-light);text-decoration:none;font-weight:700;font-size:.85rem;margin-left:16px}
  .top-links a:hover{color:#fff}
  .wrap{max-width:1100px;margin:0 auto;padding:24px}

  .gate{max-width:380px;margin:80px auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 18px 50px rgba(27,42,90,.15);text-align:center}
  .gate h2{font-family:'Playfair Display',serif;margin-bottom:6px}
  .gate p{color:var(--navy-light);font-size:.86rem;margin-bottom:18px}
  .gate input{width:100%;padding:12px 14px;border:1.5px solid var(--amber-light);border-radius:11px;font-family:inherit;font-weight:700;background:var(--amber-bg);margin-bottom:12px;text-align:center}
  .gate input:focus{outline:none;border-color:var(--amber);background:#fff}
  .btn{background:var(--amber);color:var(--navy);border:none;border-radius:11px;padding:12px 18px;font-family:inherit;font-weight:800;cursor:pointer;font-size:.92rem}
  .btn:hover{background:#ffc62b}
  .btn.full{width:100%}
  .err-msg{color:#c0392b;font-weight:700;margin-top:10px;font-size:.85rem}
  .hidden{display:none}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
  .card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 6px 18px rgba(27,42,90,.07);position:relative;overflow:hidden}
  .card::after{content:'';position:absolute;right:-20px;top:-20px;width:70px;height:70px;border-radius:50%;background:var(--amber-pale)}
  .card .k{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--navy-light);font-weight:700;position:relative;z-index:1}
  .card .v{font-size:1.9rem;font-weight:800;font-family:'Playfair Display',serif;margin-top:4px;position:relative;z-index:1}
  .card.accent{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff}
  .card.accent .k{color:var(--amber-light)}
  .card.accent::after{background:rgba(245,168,0,.25)}

  .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:760px){.chart-grid{grid-template-columns:1fr}}
  .panel{background:#fff;border-radius:18px;padding:20px;box-shadow:0 6px 18px rgba(27,42,90,.07)}
  .panel h3{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:14px}
  .panel canvas{max-height:300px}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
  @media(max-width:600px){.split{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="gate" class="gate">
  <h2>Analytics Access</h2>
  <p>Enter the admin password to view business stats.</p>
  <input id="adminKey" type="password" placeholder="Admin password"/>
  <button class="btn full" onclick="enter()">View Analytics</button>
  <div class="err-msg hidden" id="gateErr">Wrong password. Try again.</div>
</div>

<script>
/* ⚙️ Same Apps Script Web App URL as the other pages */
var API_URL = "https://script.google.com/macros/s/AKfycbyB-pCn5FPFzHyHQWjziQ_QvsFFSlkpzdaRCeVGGVOWbYAXdMoTADMwAW6humC0-Eok/exec";
var ADMIN_SESSION="rd_admin_key";
var adminKey="";
var charts={};
function $(id){return document.getElementById(id);}

async function api(p){
  if(API_URL.indexOf("PASTE_YOUR")!==-1) throw new Error("Add your Apps Script URL (API_URL) in stats.html.");
  var res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)});
  return res.json();
}

async function enter(){
  var key=$("adminKey").value.trim(); if(!key) return;
  adminKey=key; $("gateErr").classList.add("hidden");
  try{
    var r=await api({action:"getStats",adminKey:adminKey});
    if(r.success){
      sessionStorage.setItem(ADMIN_SESSION,adminKey);
      $("gate").classList.add("hidden"); $("dash").classList.remove("hidden");
      paint(r);
    }else $("gateErr").classList.remove("hidden");
  }catch(e){ $("gateErr").textContent=e.message; $("gateErr").classList.remove("hidden"); }
}
function logout(){ sessionStorage.removeItem(ADMIN_SESSION); location.reload(); }

function paint(r){
  var t=r.totals;
  $("cards").innerHTML=[
    ["Revenue (confirmed)","Rs."+t.revenue,true],
    ["Total Orders",t.orders],
    ["Registered Users",t.users],
    ["Active Subscriptions",t.activeSubs],
    ["Paid Orders",t.paidCount],
    ["Pending Payment",t.pendingCount]
  ].map(function(c){return '<div class="card'+(c[2]?' accent':'')+'"><div class="k">'+c[0]+'</div><div class="v">'+c[1]+'</div></div>';}).join("");

  var AMBER="#F5A800",NAVY="#1B2A5A";
  // revenue line
  drawChart("revChart","line",{
    labels:r.revenueSeries.map(function(d){return d.date.slice(5);}),
    datasets:[{label:"Revenue (Rs.)",data:r.revenueSeries.map(function(d){return d.revenue;}),
      borderColor:AMBER,backgroundColor:"rgba(245,168,0,.15)",fill:true,tension:.35,pointRadius:3,pointBackgroundColor:NAVY}]
  });
  // top products
  drawChart("prodChart","bar",{
    labels:r.topProducts.map(function(p){return p.product;}),
    datasets:[{label:"Orders",data:r.topProducts.map(function(p){return p.count;}),
      backgroundColor:NAVY,borderRadius:6}]
  });
  // payment status doughnut
  drawChart("payChart","doughnut",{
    labels:["Paid","Pending"],
    datasets:[{data:[t.paidCount,t.pendingCount],backgroundColor:[AMBER,"#e0d4b0"],borderWidth:0}]
  },{cutout:"62%"});

  $("summary").innerHTML=
    "📦 <b>"+t.orders+"</b> total orders<br>"+
    "🔁 <b>"+t.subscriptions+"</b> subscriptions ("+t.activeSubs+" active)<br>"+
    "👤 <b>"+t.users+"</b> registered customers<br>"+
    "💰 <b>Rs."+t.revenue+"</b> confirmed revenue<br>"+
    "⏳ <b>"+t.pendingCount+"</b> orders awaiting payment confirmation";
}

function drawChart(id,type,data,extra){
  if(charts[id]) charts[id].destroy();
  var opts={responsive:true,plugins:{legend:{display:type!=="bar"}},
    scales:type==="doughnut"?{}:{y:{beginAtZero:true,ticks:{precision:0}}}};
  if(extra) for(var k in extra) opts[k]=extra[k];
  charts[id]=new Chart($(id),{type:type,data:data,options:opts});
}

(function(){var k=sessionStorage.getItem(ADMIN_SESSION); if(k){$("adminKey").value=k; enter();}})();
$("adminKey").addEventListener("keydown",function(e){if(e.key==="Enter")enter();});
</script>
