<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard — RD Dairy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{--amber:#F5A800;--amber-dark:#C47E00;--amber-light:#FFEAA0;--amber-pale:#FFF8DC;--amber-bg:#FFFBF0;--navy:#1B2A5A;--navy-light:#2D3F7A;--ok:#2e7d32;--warn:#C47E00;--err:#c0392b}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;color:var(--navy);background:var(--amber-bg);min-height:100vh}
  header{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:0 2px 0 var(--amber)}
  header h1{font-family:'Playfair Display',serif;font-size:1.4rem;display:flex;align-items:center;gap:10px}
  header .badge{width:34px;height:34px;border-radius:9px;background:var(--amber);color:var(--navy);display:grid;place-items:center;font-weight:800}
  .top-links a{color:var(--amber-light);text-decoration:none;font-weight:700;font-size:.85rem;margin-left:16px}
  .top-links a:hover{color:#fff}
  .wrap{max-width:1200px;margin:0 auto;padding:22px}

  /* gate */
  .gate{max-width:380px;margin:80px auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 18px 50px rgba(27,42,90,.15);text-align:center}
  .gate h2{font-family:'Playfair Display',serif;margin-bottom:6px}
  .gate p{color:var(--navy-light);font-size:.86rem;margin-bottom:18px}
  .gate input{width:100%;padding:12px 14px;border:1.5px solid var(--amber-light);border-radius:11px;font-family:inherit;font-weight:700;font-size:.95rem;background:var(--amber-bg);margin-bottom:12px;text-align:center}
  .gate input:focus{outline:none;border-color:var(--amber);background:#fff}
  .btn{background:var(--amber);color:var(--navy);border:none;border-radius:11px;padding:12px 18px;font-family:inherit;font-weight:800;cursor:pointer;font-size:.92rem;transition:background .2s,transform .15s}
  .btn:hover{background:#ffc62b;transform:translateY(-1px)}
  .btn.full{width:100%}

  /* stat cards */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px}
  .card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 6px 18px rgba(27,42,90,.07);border-left:4px solid var(--amber)}
  .card .k{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--navy-light);font-weight:700}
  .card .v{font-size:1.7rem;font-weight:800;font-family:'Playfair Display',serif;margin-top:4px}

  .tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .tab{background:#fff;border:1.5px solid var(--amber-light);color:var(--navy);padding:9px 18px;border-radius:99px;font-weight:800;cursor:pointer;font-size:.88rem}
  .tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
  .toolbar input{flex:1;min-width:180px;padding:10px 14px;border:1.5px solid var(--amber-light);border-radius:11px;font-family:inherit;font-weight:600;background:#fff}
  .toolbar input:focus{outline:none;border-color:var(--amber)}

  .table-wrap{background:#fff;border-radius:16px;overflow:auto;box-shadow:0 6px 18px rgba(27,42,90,.07)}
  table{width:100%;border-collapse:collapse;font-size:.84rem;min-width:760px}
  th{background:var(--amber-pale);color:var(--navy);text-align:left;padding:12px;font-weight:800;white-space:nowrap;position:sticky;top:0}
  td{padding:11px 12px;border-top:1px solid var(--amber-pale);vertical-align:top}
  tr:hover td{background:var(--amber-bg)}
  .pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.72rem;font-weight:800}
  .pill.pending{background:#fff3e0;color:var(--warn)}
  .pill.submitted{background:#e3f2fd;color:#1565c0}
  .pill.paid{background:#e8f5e9;color:var(--ok)}
  .pill.cancel{background:#fdecea;color:var(--err)}
  .status-sel{padding:6px 8px;border-radius:8px;border:1.5px solid var(--amber-light);font-family:inherit;font-weight:700;font-size:.78rem;background:#fff;cursor:pointer}
  .wa-btn{display:inline-block;background:#25D366;color:#fff;padding:6px 12px;border-radius:8px;font-weight:800;font-size:.78rem;text-decoration:none;white-space:nowrap}
  .wa-btn:hover{background:#1da851}
  .muted{color:var(--navy-light);font-size:.8rem}
  .empty{padding:40px;text-align:center;color:var(--navy-light);font-weight:700}
  .err-msg{color:var(--err);font-weight:700;margin-top:10px;font-size:.85rem}
  .refresh{margin-left:auto}
  .hidden{display:none}
</style>
</head>
<body>

<div id="gate" class="gate">
  <h2>Admin Access</h2>
  <p>Enter the admin password to view orders &amp; subscriptions.</p>
  <input id="adminKey" type="password" placeholder="Admin password" />
  <button class="btn full" onclick="enter()">Enter Dashboard</button>
  <div class="err-msg hidden" id="gateErr">Wrong password. Try again.</div>
</div>

<script>
/* ⚙️ Same Apps Script Web App URL as auth.html / index.html */
var API_URL = "https://script.google.com/macros/s/AKfycbyB-pCn5FPFzHyHQWjziQ_QvsFFSlkpzdaRCeVGGVOWbYAXdMoTADMwAW6humC0-Eok/exec";

var ADMIN_SESSION = "rd_admin_key";
var adminKey = "";
var data = { orders: [], subscriptions: [] };
var view = "orders";

function $(id){return document.getElementById(id);}

async function api(payload){
  if(API_URL.indexOf("PASTE_YOUR")!==-1) throw new Error("Add your Apps Script URL (API_URL) in admin.html.");
  var res = await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
  return res.json();
}

async function enter(){
  var key = $("adminKey").value.trim();
  if(!key) return;
  adminKey = key;
  $("gateErr").classList.add("hidden");
  try{
    var r = await api({action:"getAdminData",adminKey:adminKey});
    if(r.success){
      sessionStorage.setItem(ADMIN_SESSION, adminKey);
      data = { orders:r.orders||[], subscriptions:r.subscriptions||[] };
      $("gate").classList.add("hidden");
      $("dash").classList.remove("hidden");
      renderCards(); render();
    }else{
      $("gateErr").classList.remove("hidden");
    }
  }catch(e){ $("gateErr").textContent=e.message; $("gateErr").classList.remove("hidden"); }
}

function logout(){ sessionStorage.removeItem(ADMIN_SESSION); location.reload(); }

async function loadData(){
  try{
    var r = await api({action:"getAdminData",adminKey:adminKey});
    if(r.success){ data={orders:r.orders||[],subscriptions:r.subscriptions||[]}; renderCards(); render(); }
  }catch(e){ alert(e.message); }
}

function switchView(v){
  view=v;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===v));
  render();
}

function statusPill(s){
  s=(s||"").toString();
  var cls="pending";
  if(/paid|received|confirmed/i.test(s)) cls="paid";
  else if(/submitted/i.test(s)) cls="submitted";
  else if(/cancel/i.test(s)) cls="cancel";
  return '<span class="pill '+cls+'">'+(s||"—")+'</span>';
}
function fmtDate(d){ if(!d) return "—"; var dt=new Date(d); return isNaN(dt)?d:dt.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
function mapCell(link){ if(!link) return '<span class="muted">—</span>'; return '<a href="'+link+'" target="_blank" style="color:var(--amber-dark);font-weight:800;white-space:nowrap;">📍 Map</a>'; }
function waButton(mobile, name, id, status){
  if(!mobile) return '<span class="muted">—</span>';
  var m = mobile.toString().replace(/\D/g,'');
  if(m.length===10) m = '91'+m;  // add India country code if 10-digit
  var msg = 'Hi '+(name||'')+', regarding your RD Dairy order '+(id||'')+
            (status? ' (status: '+status+')':'')+' — ';
  var url = 'https://wa.me/'+m+'?text='+encodeURIComponent(msg);
  return '<a href="'+url+'" target="_blank" class="wa-btn">💬 WhatsApp</a>';
}

function renderCards(){
  var o=data.orders, s=data.subscriptions;
  var revenue=o.filter(x=>/paid|received|confirmed/i.test((x.Status||""))).reduce((a,x)=>a+(Number(x.Amount)||0),0);
  var pending=o.filter(x=>!/paid|received|confirmed/i.test((x.Status||""))).length;
  $("cards").innerHTML=[
    ["Total Orders",o.length],
    ["Subscriptions",s.length],
    ["Pending Payment",pending],
    ["Revenue (confirmed)","Rs."+revenue]
  ].map(c=>'<div class="card"><div class="k">'+c[0]+'</div><div class="v">'+c[1]+'</div></div>').join("");
}

var STATUS_OPTS = {
  orders:["Pending Payment","Payment Submitted","Paid","Out for Delivery","Delivered","Cancelled"],
  subs:["Pending Confirmation","Payment Submitted","Active","Paused","Cancelled"]
};

function render(){
  var q=($("search").value||"").toLowerCase().trim();
  var rows = view==="orders" ? data.orders : data.subscriptions;
  rows = rows.filter(r=>{
    if(!q) return true;
    return JSON.stringify(r).toLowerCase().indexOf(q)!==-1;
  });

  if(!rows.length){ $("tableArea").innerHTML='<div class="empty">No '+(view==="orders"?"orders":"subscriptions")+' yet.</div>'; return; }

  var html, opts=(view==="orders"?STATUS_OPTS.orders:STATUS_OPTS.subs);
  if(view==="orders"){
    html='<table><thead><tr><th>Order ID</th><th>Date</th><th>Name</th><th>Mobile</th><th>Address</th><th>Map</th><th>Items</th><th>Amount</th><th>Pay Ref</th><th>Status</th><th>Contact</th></tr></thead><tbody>';
    rows.forEach(r=>{
      html+='<tr>'+
        '<td><b>'+(r.OrderId||"")+'</b></td>'+
        '<td class="muted">'+fmtDate(r.Date)+'</td>'+
        '<td>'+(r.Name||"")+'</td>'+
        '<td>'+(r.Mobile||"")+'</td>'+
        '<td class="muted">'+(r.Address||"")+'</td>'+
        '<td>'+mapCell(r.MapLink)+'</td>'+
        '<td class="muted">'+(r.Items||"")+'</td>'+
        '<td><b>Rs.'+(r.Amount||0)+'</b></td>'+
        '<td class="muted">'+(r.PaymentRef||"—")+'</td>'+
        '<td>'+statusPill(r.Status)+'<br>'+statusSelect("order",r.OrderId,r.Status,opts)+'</td>'+
        '<td>'+waButton(r.Mobile,r.Name,r.OrderId,r.Status)+'</td>'+
      '</tr>';
    });
  }else{
    html='<table><thead><tr><th>Sub ID</th><th>Date</th><th>Name</th><th>Mobile</th><th>Address</th><th>Map</th><th>Product</th><th>Qty</th><th>Plan</th><th>Status</th><th>Contact</th></tr></thead><tbody>';
    rows.forEach(r=>{
      html+='<tr>'+
        '<td><b>'+(r.SubId||"")+'</b></td>'+
        '<td class="muted">'+fmtDate(r.Date)+'</td>'+
        '<td>'+(r.Name||"")+'</td>'+
        '<td>'+(r.Mobile||"")+'</td>'+
        '<td class="muted">'+(r.Address||"")+'</td>'+
        '<td>'+mapCell(r.MapLink)+'</td>'+
        '<td>'+(r.Product||"")+'</td>'+
        '<td>'+(r.Qty||"")+'</td>'+
        '<td class="muted">'+(r.Plan||"")+'</td>'+
        '<td>'+statusPill(r.Status)+'<br>'+statusSelect("sub",r.SubId,r.Status,opts)+'</td>'+
        '<td>'+waButton(r.Mobile,r.Name,r.SubId,r.Status)+'</td>'+
      '</tr>';
    });
  }
  html+='</tbody></table>';
  $("tableArea").innerHTML=html;
}

function statusSelect(type,id,current,opts){
  var o=opts.map(function(s){return '<option '+(s===current?"selected":"")+'>'+s+'</option>';}).join("");
  return '<select class="status-sel" onchange="changeStatus(\''+type+'\',\''+id+'\',this.value)">'+o+'</select>';
}

async function changeStatus(type,id,status){
  try{
    var r=await api({action:"updateStatus",adminKey:adminKey,type:type,id:id,status:status});
    if(r.success){
      // update locally for instant feedback
      var arr = type==="sub"?data.subscriptions:data.orders;
      var idKey = type==="sub"?"SubId":"OrderId";
      arr.forEach(function(x){ if(x[idKey]===id) x.Status=status; });
      renderCards(); render();
      // then re-sync from the sheet so it matches exactly on refresh
      loadData();
    }else alert(r.message||"Update failed");
  }catch(e){ alert(e.message); }
}

/* auto-login if key stored this session */
(function(){
  var k=sessionStorage.getItem(ADMIN_SESSION);
  if(k){ $("adminKey").value=k; enter(); }
})();
$("adminKey").addEventListener("keydown",function(e){ if(e.key==="Enter") enter(); });
</script>
