<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login / Register — RD Dairy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     CONFIG — paste your Apps Script Web App URL here after setup
  ============================================================ */
  /* (used in JS below) */

  :root{
    --amber:#F5A800;
    --amber-dark:#C47E00;
    --amber-light:#FFEAA0;
    --amber-pale:#FFF8DC;
    --amber-bg:#FFFBF0;
    --navy:#1B2A5A;
    --navy-light:#2D3F7A;
    --ok:#2e7d32;
    --err:#c0392b;
    --r:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Nunito',sans-serif;
    color:var(--navy);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:
      radial-gradient(ellipse 70% 60% at 80% 10%, rgba(245,168,0,.22) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 10% 90%, rgba(27,42,90,.10) 0%, transparent 55%),
      var(--amber-bg);
    position:relative;
    overflow-x:hidden;
  }
  /* soft floating dairy-drop decoration */
  body::before{
    content:'';position:fixed;width:380px;height:380px;
    top:-120px;right:-120px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.9), var(--amber-light));
    opacity:.35;filter:blur(8px);pointer-events:none;z-index:0;
  }

  .card{
    position:relative;z-index:2;
    width:100%;max-width:430px;
    background:#fff;
    border-radius:26px;
    box-shadow:0 24px 70px rgba(27,42,90,.16), 0 2px 0 rgba(245,168,0,.25);
    overflow:hidden;
    animation:rise .6s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}

  /* header band */
  .card-head{
    background:linear-gradient(135deg,var(--navy) 0%, var(--navy-light) 100%);
    padding:30px 32px 26px;
    text-align:center;
    position:relative;
  }
  .card-head::after{
    content:'';position:absolute;left:0;right:0;bottom:0;height:4px;
    background:linear-gradient(90deg,var(--amber),var(--amber-light),var(--amber));
  }
  .logo{
    display:inline-flex;align-items:center;gap:9px;
    color:#fff;text-decoration:none;margin-bottom:8px;
  }
  .logo-badge{
    width:54px;height:54px;border-radius:14px;
    object-fit:cover;display:block;
    box-shadow:0 6px 18px rgba(0,0,0,.35);
    border:2px solid rgba(245,168,0,.55);
  }
  .logo-name{font-family:'Playfair Display',serif;font-weight:800;font-size:1.45rem;letter-spacing:.3px}
  .card-sub{color:var(--amber-light);font-size:.86rem;font-weight:600}

  /* tabs */
  .tabs{display:flex;background:var(--amber-pale);margin:0;}
  .tab{
    flex:1;padding:15px;border:none;background:transparent;
    font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;
    color:var(--amber-dark);cursor:pointer;position:relative;
    transition:color .2s;
  }
  .tab.active{color:var(--navy)}
  .tab.active::after{
    content:'';position:absolute;left:18%;right:18%;bottom:0;height:3px;
    background:var(--amber);border-radius:3px 3px 0 0;
  }

  .form-wrap{padding:28px 32px 32px}
  .form{display:none;animation:fade .35s ease both}
  .form.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:.8rem;font-weight:700;color:var(--navy);margin-bottom:6px}
  .input-shell{position:relative}
  .input-shell svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.5}
  .field input{
    width:100%;padding:13px 14px 13px 42px;
    font-family:'Nunito',sans-serif;font-size:.96rem;font-weight:600;
    border:1.5px solid var(--amber-light);
    border-radius:12px;background:var(--amber-bg);color:var(--navy);
    transition:border-color .2s, box-shadow .2s, background .2s;
    outline:none;
  }
  .field input::placeholder{color:#b9a98a;font-weight:600}
  .field input:focus{
    border-color:var(--amber);background:#fff;
    box-shadow:0 0 0 4px rgba(245,168,0,.15);
  }
  .pw-toggle{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;font-size:.74rem;font-weight:800;
    color:var(--amber-dark);padding:4px 6px;
  }

  .submit-btn{
    width:100%;padding:14px;margin-top:6px;
    background:var(--amber);color:var(--navy);
    font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;
    border:none;border-radius:12px;cursor:pointer;
    box-shadow:0 8px 22px rgba(245,168,0,.4);
    transition:transform .15s, box-shadow .2s, background .2s;
    display:flex;align-items:center;justify-content:center;gap:9px;
  }
  .submit-btn:hover{background:#ffc62b;transform:translateY(-2px);box-shadow:0 12px 28px rgba(245,168,0,.5)}
  .submit-btn:active{transform:translateY(0)}
  .submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

  .spinner{width:18px;height:18px;border:2.5px solid rgba(27,42,90,.3);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .submit-btn.loading .spinner{display:block}
  .submit-btn.loading .btn-label{display:none}

  .msg{
    margin-top:14px;padding:11px 14px;border-radius:10px;font-size:.86rem;font-weight:700;
    display:none;align-items:center;gap:8px;line-height:1.4;
  }
  .msg.show{display:flex}
  .msg.ok{background:#e8f5e9;color:var(--ok);border:1px solid #a5d6a7}
  .msg.err{background:#fdecea;color:var(--err);border:1px solid #f5b7b1}

  .switch-hint{text-align:center;margin-top:18px;font-size:.85rem;color:var(--navy);font-weight:600}
  .switch-hint a{color:var(--amber-dark);font-weight:800;cursor:pointer;text-decoration:none}
  .switch-hint a:hover{text-decoration:underline}

  .back-home{
    position:absolute;top:18px;left:18px;z-index:5;
    color:#fff;text-decoration:none;font-size:.82rem;font-weight:700;
    display:inline-flex;align-items:center;gap:5px;opacity:.85;
  }
  .back-home:hover{opacity:1}

  /* logged-in panel */
  .welcome{display:none;padding:34px 32px;text-align:center}
  .welcome.active{display:block}
  .welcome .tick{
    width:64px;height:64px;border-radius:50%;background:#e8f5e9;color:var(--ok);
    display:grid;place-items:center;margin:0 auto 16px;font-size:2rem;
  }
  .welcome h3{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:6px}
  .welcome p{color:var(--navy-light);font-size:.9rem;margin-bottom:22px;font-weight:600}
  .welcome .row{display:flex;gap:10px}
  .ghost-btn{
    flex:1;padding:12px;border:1.5px solid var(--amber);background:#fff;color:var(--navy);
    border-radius:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;font-size:.92rem;
    transition:background .2s;
  }
  .ghost-btn:hover{background:var(--amber-pale)}
  .shop-btn{
    flex:1;padding:12px;border:none;background:var(--navy);color:#fff;
    border-radius:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;font-size:.92rem;
    transition:background .2s;text-decoration:none;display:grid;place-items:center;
  }
  .shop-btn:hover{background:var(--navy-light)}
</style>
</head>

      <div class="card-sub">Fresh A2 Milk • Chennai</div>

    <!-- TABS -->
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="login">Login</button>
      <button class="tab" data-tab="register">Register</button>
    </div>

    <div class="form-wrap">

      <!-- LOGIN FORM -->
      <form class="form active" id="loginForm" autocomplete="on">
        <div class="field">
          <label for="loginMobile">Mobile Number</label>
          <div class="input-shell">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1B2A5A" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2.5"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
            <input id="loginMobile" type="tel" inputmode="numeric" maxlength="10" placeholder="10-digit mobile number" required/>
          </div>
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <div class="input-shell">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1B2A5A" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2.5"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
            <input id="loginPassword" type="password" placeholder="Your password" required/>
            <button type="button" class="pw-toggle" data-target="loginPassword">SHOW</button>
          </div>
        </div>
        <button type="submit" class="submit-btn" id="loginBtn">
          <span class="btn-label">Login</span>
          <span class="spinner"></span>
        </button>
        <div class="msg" id="loginMsg"></div>
        <div class="switch-hint">New to RD Dairy? <a data-goto="register">Create an account</a></div>
      </form>

      <!-- REGISTER FORM -->
      <form class="form" id="registerForm" autocomplete="on">
        <div class="field">
          <label for="regName">Full Name</label>
          <div class="input-shell">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1B2A5A" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
            <input id="regName" type="text" placeholder="Your name" required/>
          </div>
        </div>
        <div class="field">
          <label for="regMobile">Mobile Number</label>
          <div class="input-shell">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1B2A5A" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2.5"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
            <input id="regMobile" type="tel" inputmode="numeric" maxlength="10" placeholder="10-digit mobile number" required/>
          </div>
        </div>
        <div class="field">
          <label for="regPassword">Create Password</label>
          <div class="input-shell">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1B2A5A" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2.5"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
            <input id="regPassword" type="password" placeholder="At least 6 characters" required minlength="6"/>
            <button type="button" class="pw-toggle" data-target="regPassword">SHOW</button>
          </div>
        </div>
        <button type="submit" class="submit-btn" id="regBtn">
          <span class="btn-label">Create Account</span>
          <span class="spinner"></span>
        </button>
        <div class="msg" id="regMsg"></div>
        <div class="switch-hint">Already have an account? <a data-goto="login">Login here</a></div>
      </form>

      <!-- LOGGED IN PANEL -->
      <div class="welcome" id="welcomePanel">
        <div class="tick">✓</div>
        <h3 id="welcomeName">Welcome!</h3>
        <p id="welcomeMobile"></p>
        <div class="row">
          <a class="shop-btn" href="index.html">Start Shopping</a>
          <button class="ghost-btn" id="logoutBtn">Log out</button>
        </div>
      </div>

    </div>
  </div>

<script>
/* ============================================================
   ⚙️  CONFIG
   After you deploy the Google Apps Script (instructions provided),
   paste the Web App URL between the quotes below.
============================================================ */
const API_URL = "https://script.google.com/macros/s/AKfycbyB-pCn5FPFzHyHQWjziQ_QvsFFSlkpzdaRCeVGGVOWbYAXdMoTADMwAW6humC0-Eok/exec";

/* ---- tiny helpers ---- */
const $ = id => document.getElementById(id);
const SESSION_KEY = "rd_dairy_user";

function showMsg(el, text, type){
  el.textContent = text;
  el.className = "msg show " + type;
}
function clearMsg(el){ el.className = "msg"; }

function setLoading(btn, on){
  btn.classList.toggle("loading", on);
  btn.disabled = on;
}

/* ---- tab switching ---- */
function activate(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.tab===tab));
  $("loginForm").classList.toggle("active", tab==="login");
  $("registerForm").classList.toggle("active", tab==="register");
  $("welcomePanel").classList.remove("active");
  $("tabs").style.display = "flex";
}
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>activate(t.dataset.tab)));
document.querySelectorAll("[data-goto]").forEach(a=>a.addEventListener("click",()=>activate(a.dataset.goto)));

/* ---- password show/hide ---- */
document.querySelectorAll(".pw-toggle").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const inp = $(btn.dataset.target);
    const show = inp.type === "password";
    inp.type = show ? "text" : "password";
    btn.textContent = show ? "HIDE" : "SHOW";
  });
});

/* ---- numeric-only mobile inputs ---- */
["loginMobile","regMobile"].forEach(id=>{
  $(id).addEventListener("input",e=>{ e.target.value = e.target.value.replace(/\D/g,"").slice(0,10); });
});

/* ---- call backend (Apps Script). Uses text/plain to avoid CORS preflight ---- */
async function callApi(action, payload){
  if(API_URL.includes("PASTE_YOUR")){
    throw new Error("Backend not connected yet. Add your Apps Script URL in auth.html (API_URL).");
  }
  const res = await fetch(API_URL, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify({ action, ...payload })
  });
  return res.json();
}

/* ---- session ---- */
function saveSession(user){
  localStorage.setItem(SESSION_KEY, JSON.stringify(user));
}
function getSession(){
  try{ return JSON.parse(localStorage.getItem(SESSION_KEY)); }catch{ return null; }
}
function clearSession(){ localStorage.removeItem(SESSION_KEY); }

function showWelcome(user){
  $("tabs").style.display = "none";
  $("loginForm").classList.remove("active");
  $("registerForm").classList.remove("active");
  $("welcomePanel").classList.add("active");
  $("welcomeName").textContent = "Welcome, " + user.name + "!";
  $("welcomeMobile").textContent = "Logged in as " + user.mobile;
}

/* ---- REGISTER ---- */
$("registerForm").addEventListener("submit", async e=>{
  e.preventDefault();
  clearMsg($("regMsg"));
  const name = $("regName").value.trim();
  const mobile = $("regMobile").value.trim();
  const password = $("regPassword").value;

  if(mobile.length !== 10){ return showMsg($("regMsg"),"Enter a valid 10-digit mobile number.","err"); }
  if(password.length < 6){ return showMsg($("regMsg"),"Password must be at least 6 characters.","err"); }

  setLoading($("regBtn"), true);
  try{
    const r = await callApi("register", { name, mobile, password });
    if(r.success){
      const user = { name, mobile, profileComplete:false };
      saveSession(user);
      showMsg($("regMsg"),"Account created! Setting up your profile…","ok");
      setTimeout(()=>{ window.location.href="profile.html"; }, 700);
    }else{
      showMsg($("regMsg"), r.message || "Could not register.", "err");
    }
  }catch(err){
    showMsg($("regMsg"), err.message, "err");
  }finally{
    setLoading($("regBtn"), false);
  }
});

/* ---- LOGIN ---- */
$("loginForm").addEventListener("submit", async e=>{
  e.preventDefault();
  clearMsg($("loginMsg"));
  const mobile = $("loginMobile").value.trim();
  const password = $("loginPassword").value;

  if(mobile.length !== 10){ return showMsg($("loginMsg"),"Enter a valid 10-digit mobile number.","err"); }

  setLoading($("loginBtn"), true);
  try{
    const r = await callApi("login", { mobile, password });
    if(r.success){
      const user = { name: r.name, mobile, email: r.email||"", address: r.address||"", profileComplete: !!r.profileComplete };
      saveSession(user);
      showMsg($("loginMsg"),"Login successful!","ok");
      setTimeout(()=>{
        window.location.href = user.profileComplete ? "index.html" : "profile.html";
      }, 500);
    }else{
      showMsg($("loginMsg"), r.message || "Invalid mobile number or password.", "err");
    }
  }catch(err){
    showMsg($("loginMsg"), err.message, "err");
  }finally{
    setLoading($("loginBtn"), false);
  }
});

/* ---- LOGOUT ---- */
$("logoutBtn").addEventListener("click", ()=>{
  clearSession();
  $("loginForm").reset();
  $("registerForm").reset();
  activate("login");
});

/* ---- on load: stay logged in until user logs out ---- */
(function init(){
  const u = getSession();
  if(u && u.mobile){
    if(u.profileComplete){ showWelcome(u); }
    else { window.location.href = "profile.html"; }
  }
})();
</script>
</body>
